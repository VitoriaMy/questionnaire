name: 社区用户意见征集
description: 收集社区用户建议、痛点和优先需求
title: "[Community Feedback] "
labels:
  - survey-response
  - survey:community-feedback
body:
  - type: markdown
    attributes:
      value: |
        感谢提交社区反馈。此问卷会以公开 Issue 的形式保存，并参与自动汇总。
  - type: input
    id: github-username
    attributes:
      label: GitHub 用户名
      placeholder: 例如 octocat
    validations:
      required: true
  - type: input
    id: contact-email
    attributes:
      label: 联系邮箱
      placeholder: 例如 you@example.com
    validations:
      required: false
  - type: input
    id: experienced-at
    attributes:
      label: 问题出现日期
      placeholder: 例如 2026-07-06
    validations:
      required: true
  - type: dropdown
    id: satisfaction-score
    attributes:
      label: 当前满意度评分
      options:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: 改进建议 / 需求反馈
      placeholder: 请详细描述你的想法、遇到的问题或希望新增的能力。
    validations:
      required: true