name: Automated Data Aggregation

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - closed
      - labeled
      - unlabeled
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Aggregate Issues to Markdown
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const surveyTitles = {
              'survey:community-feedback': '社区用户意见征集',
              'survey:feature-voting': '功能优先级投票',
              'survey:event-registration': '活动报名问卷',
            };

            const escapeMarkdownCell = (value) =>
              String(value ?? '-')
                .replace(/\r?\n/g, '<br>')
                .replace(/\|/g, '\\|')
                .trim() || '-';

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'survey-response',
              per_page: 100,
            });

            const records = issues
              .filter((issue) => !issue.pull_request)
              .map((issue) => {
                const surveyLabel = issue.labels
                  .map((label) => (typeof label === 'string' ? label : label.name))
                  .find((label) => label && label.startsWith('survey:'));

                return {
                  number: issue.number,
                  title: issue.title,
                  surveyTitle: surveyTitles[surveyLabel] || surveyLabel || '未分类问卷',
                  username: issue.user?.login || '匿名',
                  state: issue.state,
                  createdAt: issue.created_at,
                  url: issue.html_url,
                };
              })
              .sort((left, right) => new Date(left.createdAt).getTime() - new Date(right.createdAt).getTime());

            const surveyCounts = records.reduce((accumulator, record) => {
              accumulator[record.surveyTitle] = (accumulator[record.surveyTitle] || 0) + 1;
              return accumulator;
            }, {});

            let markdown = '# 问卷统计最新汇总\n\n';
            markdown += `> 本报表由 GitHub Actions 自动构建。更新时间 (UTC): ${new Date().toISOString()}\n\n`;
            markdown += `总提交数：**${records.length}**\n\n`;
            markdown += '## 各问卷提交量\n\n';

            if (records.length === 0) {
              markdown += '- 暂无有效数据\n\n';
            } else {
              Object.entries(surveyCounts)
                .sort((left, right) => right[1] - left[1])
                .forEach(([surveyTitle, count]) => {
                  markdown += `- ${surveyTitle}: **${count}**\n`;
                });
              markdown += '\n';
            }

            markdown += '| 序号 | 提交时间 (UTC) | 问卷 | 提交者 | 状态 | Issue |\n';
            markdown += '| :---: | :--- | :--- | :--- | :---: | :--- |\n';

            if (records.length === 0) {
              markdown += '| 1 | - | - | - | - | 暂无有效数据 |\n';
            } else {
              records.forEach((record, index) => {
                markdown += `| ${index + 1} | ${escapeMarkdownCell(new Date(record.createdAt).toISOString())} | ${escapeMarkdownCell(record.surveyTitle)} | ${escapeMarkdownCell(record.username)} | ${escapeMarkdownCell(record.state)} | [#${record.number}](${record.url}) ${escapeMarkdownCell(record.title)} |\n`;
              });
            }

            fs.writeFileSync('SUMMARY.md', markdown, 'utf8');
            console.log(`SUMMARY.md compiled successfully with ${records.length} issue entries.`);

      - name: Commit and Push Report
        run: |
          if git diff --quiet -- SUMMARY.md; then
            echo "No summary changes detected."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SUMMARY.md
          git commit -m "docs: update survey summary [skip ci]"
          git push